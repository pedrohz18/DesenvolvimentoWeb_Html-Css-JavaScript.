<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulário</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: sans-serif;
            background-color: #ffffff;
            color: #000000;
        }

        form {
            width: 90%;
            max-width: 450px;
        }

        fieldset {
            border: 1px solid #a0a0a0;
            border-radius: 8px;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        legend {
            font-weight: bold;
            padding: 0 5px;
        }

        .campo {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        input[type="text"],
        input[type="email"],
        input[type="password"],
        input[type="date"],
        textarea {
            padding: 8px;
            border: 1px solid #a0a0a0;
            border-radius: 4px;
        }

        input:focus, 
        textarea:focus {
            outline: none;
            border-color: #0056b3;
            box-shadow: 0 0 4px rgba(0, 86, 179, 0.4);
        }

        .opcoes {
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        button {
            padding: 10px;
            background-color: #e0e0e0;
            color: #000000;
            border: 1px solid #a0a0a0;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #cccccc;
        }
    </style>
</head>

<body>
    <form action="" method="POST" enctype="multipart/form-data">
        <fieldset>
            <legend>Formulário de Cadastro</legend>
            
            <div class="campo">
                <label for="nome">Nome:</label>
                <input type="text" id="nome" name="nome" required>
            </div>

            <div class="campo">
                <label for="email">E-mail:</label>
                <input type="email" id="email" name="email" required>
            </div>

            <div class="campo">
                <label for="senha">Senha:</label>
                <input type="password" name="senha" id="senha" required>
            </div>

            <div class="campo">
                <label for="dataNascimento">Data de nascimento:</label>
                <input type="date" name="dataNascimento" id="dataNascimento" required>
            </div>

            <div class="campo">
                <label for="curso">Curso:</label>
                <input type="text" name="curso" id="curso">
            </div>

            <div class="campo">
                <label>Sexo:</label>
                <div class="opcoes">
                    <label><input type="radio" name="sexo" value="feminino"> Feminino</label>
                    <label><input type="radio" name="sexo" value="masculino"> Masculino</label>
                </div>
            </div>

            <div class="campo">
                <label>Interesses:</label>
                <div class="opcoes">
                    <label><input type="checkbox" name="interesses" value="frontend"> Front-end</label>
                    <label><input type="checkbox" name="interesses" value="backend"> Back-end</label>
                    <label><input type="checkbox" name="interesses" value="fullstack"> Fullstack</label>
                </div>
            </div>

            <div class="campo">
                <label for="comentarios">Comentários:</label>
                <textarea name="comentarios" id="comentarios" rows="3"></textarea>
            </div>

            <div class="campo">
                <label for="foto">Upload de foto:</label>
                <input type="file" name="foto" id="foto" accept="image/*">
            </div>

            <button type="submit">Enviar</button>
        </fieldset>
    </form>
</body>

</html>
