<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela 2</title>
    <style>
        th {
            background-color: #000080;
            border: 2px solid black;
            text-align: center;
            color: white;
        }

        td {
            border: 2px solid black;
            text-align: center;
        }

        table {
            border-radius: 10px;
            border-collapse: separate;
            width: 100%;
            border: 2px solid #000080;
        }
    </style>
</head>

            <th>SEX</th>
            <th>SAB</th>
        </tr>

        <tr>
            <th>Manhã</th>
            <td>Trabalho</td>
            <td>Estudos</td>
            <td>Estudos</td>
            <td>Descanso</td>
            <td>Trabalho</td>
            <td>Trabalho</td>
            <td>Trabalho</td>
        </tr>

        <tr>
            <th>Tarde</th>
            <td>Descanso</td>
            <td>Academia(Braço)</td>
            <td>Academia(Perna)</td>
            <td>Descanso</td>
            <td>Academia(Peito)</td>
            <td>Academia(Costas)</td>
            <td>Academia(Ombro)</td>
        </tr>

        <tr>
            <th>Noite</th>

            <td>Faculdade</td>

            <td>Descanso</td>
        </tr>
    </table>
</body>
</html>
